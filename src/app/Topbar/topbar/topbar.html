<div class="topbar">
  @let topbarItems = topbarItemsSignal();
  @for (topbarItem of topbarItems; track $index) {
    <div class="topbar-item">
      @switch (topbarItem.type) {
        @case (TopbarItemType.BUTTON_ICON) {
          <app-topbar-item-button [item]="topbarItem"></app-topbar-item-button>
        }
        @case (TopbarItemType.BUTTON_TEXT) {
          <app-topbar-item-button [item]="topbarItem"></app-topbar-item-button>
        }
        @case (TopbarItemType.TEXT) {
          <app-topbar-item-text [item]="topbarItem"></app-topbar-item-text>
        }
        @default {
          |---|
        }
      }
    </div>
  }
</div>
